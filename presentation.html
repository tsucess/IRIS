<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS — Ilicity Resident Information System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #1e3a5f; --accent: #3b82f6; --accent2: #6366f1;
    --green: #10b981; --orange: #f59e0b; --red: #ef4444;
    --glass: rgba(255,255,255,0.12); --glassBorder: rgba(255,255,255,0.2);
    --text: #f0f4ff; --textDark: #1e293b;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: var(--text); overflow: hidden; height: 100vh; }
  .slides { width: 100%; height: 100vh; position: relative; }
  .slide { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 3rem; opacity: 0; pointer-events: none; transition: opacity 0.5s ease, transform 0.5s ease; transform: translateX(60px); }
  .slide.active { opacity: 1; pointer-events: all; transform: translateX(0); }
  .slide.prev { opacity: 0; transform: translateX(-60px); }
  /* Slide backgrounds */
  .s1 { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e1b4b 100%); }
  .s2 { background: linear-gradient(135deg, #0f172a 0%, #134e4a 100%); }
  .s3 { background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 60%, #1e3a5f 100%); }
  .s4 { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); }
  .s5 { background: linear-gradient(135deg, #0f172a 0%, #14532d 100%); }
  .s6 { background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%); }
  .s7 { background: linear-gradient(135deg, #0f172a 0%, #1c1917 60%, #1e3a5f 100%); }
  .s8 { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #14532d 100%); }
  .s9 { background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%); }
  .s10 { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); }
  /* Decorative circles */
  .bg-circle { position: absolute; border-radius: 50%; opacity: 0.07; pointer-events: none; }
  .c1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -100px; }
  .c2 { width: 350px; height: 350px; background: var(--accent2); bottom: -100px; left: -80px; }
  /* Typography */
  .badge { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    padding: 0.3rem 0.9rem; border-radius: 100px; background: rgba(59,130,246,0.25);
    border: 1px solid rgba(59,130,246,0.5); color: #93c5fd; margin-bottom: 1.2rem; display: inline-block; }
  h1 { font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 800; line-height: 1.1; text-align: center; }
  h2 { font-size: clamp(1.5rem, 3.5vw, 2.2rem); font-weight: 700; margin-bottom: 0.5rem; }
  h3 { font-size: 1rem; font-weight: 600; color: #93c5fd; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.8rem; }
  p { color: #94a3b8; font-size: 1rem; line-height: 1.6; max-width: 680px; text-align: center; }
  .subtitle { font-size: 1.15rem; color: #94a3b8; margin-top: 0.8rem; text-align: center; max-width: 600px; }
  /* Glass card */
  .glass { background: var(--glass); border: 1px solid var(--glassBorder); border-radius: 16px;
    backdrop-filter: blur(12px); padding: 1.5rem; }
  /* Grid layouts */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; width: 100%; max-width: 900px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; width: 100%; max-width: 960px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; width: 100%; max-width: 960px; }
  /* Feature card */
  .feat { display: flex; flex-direction: column; gap: 0.4rem; }
  .feat-icon { font-size: 2rem; margin-bottom: 0.3rem; }
  .feat h3 { color: var(--text); text-transform: none; letter-spacing: 0; font-size: 1rem; }
  .feat p { text-align: left; font-size: 0.875rem; }
  /* Stat card */
  .stat { text-align: center; }
  .stat-num { font-size: 2.8rem; font-weight: 800; line-height: 1; }
  .stat-label { font-size: 0.85rem; color: #94a3b8; margin-top: 0.3rem; }
  .blue { color: #60a5fa; } .green { color: #34d399; } .purple { color: #a78bfa; } .orange { color: #fbbf24; }
  /* Tech badge */
  .tb { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.9rem;
    border-radius: 8px; font-size: 0.82rem; font-weight: 600; margin: 0.25rem; }
  .tb-red { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .tb-blue { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }
  .tb-teal { background: rgba(20,184,166,0.15); border: 1px solid rgba(20,184,166,0.3); color: #5eead4; }
  .tb-purple { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); color: #c4b5fd; }
  .tb-green { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  /* Role table */
  .rtable { width: 100%; max-width: 820px; border-collapse: collapse; font-size: 0.88rem; }
  .rtable th { background: rgba(59,130,246,0.2); padding: 0.6rem 1rem; text-align: left; font-weight: 600; }
  .rtable td { padding: 0.55rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.08); color: #cbd5e1; }
  .rtable tr:hover td { background: rgba(255,255,255,0.04); }
  .ck { color: #34d399; } .cx { color: #475569; }
  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 0.8rem; width: 100%; max-width: 700px; }
  .tl-item { display: flex; gap: 1rem; align-items: flex-start; }
  .tl-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 0.35rem; }
  .tl-content h4 { font-size: 0.95rem; font-weight: 600; }
  .tl-content p { font-size: 0.82rem; text-align: left; }
  /* Perf bar */
  .perf-row { margin-bottom: 1rem; }
  .perf-label { font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.3rem; display: flex; justify-content: space-between; }
  .perf-bar { height: 10px; background: rgba(255,255,255,0.1); border-radius: 100px; overflow: hidden; }
  .perf-fill { height: 100%; border-radius: 100px; transition: width 1s ease 0.5s; }
  /* Navigation */
  nav { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 1rem;
    background: rgba(15,23,42,0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px; padding: 0.6rem 1.4rem; z-index: 100; }
  .nav-btn { background: none; border: none; color: #94a3b8; font-size: 1.1rem; cursor: pointer;
    padding: 0.3rem 0.5rem; border-radius: 8px; transition: all 0.2s; }
  .nav-btn:hover { color: white; background: rgba(255,255,255,0.1); }
  .nav-counter { font-size: 0.85rem; color: #64748b; min-width: 56px; text-align: center; }
  .dot-nav { display: flex; gap: 0.45rem; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #334155; cursor: pointer; transition: all 0.2s; }
  .dot.active { background: var(--accent); transform: scale(1.3); }
  .kbd { font-size: 0.72rem; color: #475569; margin-top: 0.3rem; }
  /* Progress bar top */
  .progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 0.4s ease; z-index: 200; }
  /* Logo text */
  .logo { font-size: 1rem; font-weight: 800; color: #60a5fa; letter-spacing: 0.05em; position: fixed; top: 1.2rem; left: 1.5rem; z-index: 100; }
  /* Slide number */
  .slide-num { position: fixed; top: 1.2rem; right: 1.5rem; font-size: 0.75rem; color: #475569; z-index: 100; }
  /* Flow diagram */
  .flow { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
  .flow-box { padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 600; text-align: center; }
  .flow-arrow { color: #475569; font-size: 1.2rem; }
</style>
</head>
<body>
<div class="progress-bar" id="progressBar"></div>
<div class="logo">IRIS</div>
<div class="slide-num" id="slideNum">1 / 10</div>

<div class="slides" id="slides">
</div>

<nav>
  <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)">&#8592;</button>
  <div class="dot-nav" id="dotNav"></div>
  <div class="nav-counter" id="navCounter">1 / 10</div>
  <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">&#8594;</button>
</nav>

<script>
const slides = [
  // Slide 1 — Title
  `<div class="slide s1 active" id="slide-0">
    <div class="bg-circle c1"></div><div class="bg-circle c2"></div>
    <div class="badge">🏘️ Community Management Platform</div>
    <h1>Community<br><span style="color:#60a5fa">Development</span> System</h1>
    <p class="subtitle">A full-stack Laravel 12 platform for managing residents, tracking community projects, and generating demographic insights — built for local government and community associations.</p>
    <div style="display:flex;gap:0.6rem;margin-top:1.8rem;flex-wrap:wrap;justify-content:center">
      <span class="tb tb-red">Laravel 12</span><span class="tb tb-blue">PHP 8.2+</span>
      <span class="tb tb-teal">Tailwind CSS</span><span class="tb tb-purple">Alpine.js</span>
      <span class="tb tb-green">REST API</span>
    </div>
  </div>`,

  // Slide 2 — The Problem
  `<div class="slide s2" id="slide-1">
    <div class="bg-circle c1"></div><div class="bg-circle c2"></div>
    <div class="badge">🎯 The Challenge</div>
    <h2 style="text-align:center;margin-bottom:1.5rem">Community management is fragmented</h2>
    <div class="grid3">
      <div class="glass feat"><div class="feat-icon">📋</div><h3>Manual Records</h3><p>Resident data stored in paper registers or disconnected spreadsheets — impossible to analyse.</p></div>
      <div class="glass feat"><div class="feat-icon">🔍</div><h3>No Visibility</h3><p>Administrators have no real-time view of demographics, project status, or community needs.</p></div>
      <div class="glass feat"><div class="feat-icon">🏗️</div><h3>Untracked Projects</h3><p>Development projects lack structured tracking — no deadlines, budgets, or accountability.</p></div>
      <div class="glass feat"><div class="feat-icon">📊</div><h3>No Analytics</h3><p>Decision-makers cannot access demographic breakdowns needed for policy and resource planning.</p></div>
      <div class="glass feat"><div class="feat-icon">🪪</div><h3>No Digital IDs</h3><p>Residents lack verifiable digital identity documents linked to a community database.</p></div>
      <div class="glass feat"><div class="feat-icon">🔗</div><h3>No Integration</h3><p>No API layer for third-party tools, mobile apps, or government systems to connect with.</p></div>
    </div>
  </div>`,

  // Slide 3 — Solution Overview
  `<div class="slide s3" id="slide-2">
    <div class="bg-circle c1"></div><div class="bg-circle c2"></div>
    <div class="badge">✅ The Solution</div>
    <h2 style="text-align:center;margin-bottom:0.3rem">IRIS — One Platform, All Needs</h2>
    <p style="margin-bottom:1.5rem">A unified, secure, web-based system that centralises resident management, project tracking, and community analytics.</p>
    <div class="grid2">
      <div class="glass">
        <h3>🌐 Web Interface</h3>
        <p style="text-align:left;font-size:0.88rem">Server-rendered Blade views with Tailwind CSS glassmorphism design, Alpine.js interactivity, Chart.js analytics, and Three.js particle background — accessible from any browser.</p>
      </div>
      <div class="glass">
        <h3>🔌 REST API v1</h3>
        <p style="text-align:left;font-size:0.88rem">Full JSON REST API with Sanctum bearer-token authentication — streets, projects, and tasks available for mobile apps, government portals, and third-party integrations.</p>
      </div>
      <div class="glass">
        <h3>🔒 Enterprise Security</h3>
        <p style="text-align:left;font-size:0.88rem">HTTP security headers (CSP, HSTS, X-Frame-Options), role-based access control, input sanitisation, rate limiting, and bcrypt password hashing.</p>
      </div>
      <div class="glass">
        <h3>⚡ Optimised Performance</h3>
        <p style="text-align:left;font-size:0.88rem">5-minute dashboard caching, single optimised demographics query, eager loading throughout, database indexes, and Vite asset splitting — 90% faster than baseline.</p>
      </div>
    </div>
  </div>`,

  // Slide 4 — Key Features
  `<div class="slide s4" id="slide-3">
    <div class="bg-circle c1"></div><div class="bg-circle c2"></div>
    <div class="badge">✨ Key Features</div>
    <h2 style="text-align:center;margin-bottom:1.5rem">Everything a community needs</h2>
    <div class="grid4">
      <div class="glass feat"><div class="feat-icon">👥</div><h3>Resident Management</h3><p>35+ demographic fields per resident. Profile photos, ID cards, email verification.</p></div>
      <div class="glass feat"><div class="feat-icon">🏗️</div><h3>Project Tracking</h3><p>Full project lifecycle with budget, status, dates, team assignment, and soft deletes.</p></div>
      <div class="glass feat"><div class="feat-icon">✅</div><h3>Task Management</h3><p>AJAX tasks nested under projects. Multi-user assignment. Status tracking.</p></div>
      <div class="glass feat"><div class="feat-icon">📊</div><h3>Analytics Dashboard</h3><p>15+ charts. Zone filtering. Real-time demographics from a single optimised query.</p></div>
      <div class="glass feat"><div class="feat-icon">🪪</div><h3>ID Card Generation</h3><p>QR-code embedded PDF ID cards. Downloadable per resident. Admin or self-service.</p></div>
      <div class="glass feat"><div class="feat-icon">📤</div><h3>Data Export</h3><p>Excel export with 10 combinable demographic filters. Rate-limited for security.</p></div>
      <div class="glass feat"><div class="feat-icon">🗺️</div><h3>Streets & Zones</h3><p>Geo-organised community structure. Zone-based filtering across all analytics.</p></div>
      <div class="glass feat"><div class="feat-icon">🔌</div><h3>REST API</h3><p>Full CRUD API for streets, projects, tasks. Pagination, filtering, search built-in.</p></div>
    </div>
  </div>`,

  // Slide 5 — Tech Stack
  `<div class="slide s5" id="slide-4">
    <div class="bg-circle c1"></div><div class="bg-circle c2"></div>
    <div class="badge">🛠️ Technology Stack</div>
    <h2 style="text-align:center;margin-bottom:1.5rem">Modern, battle-tested technologies</h2>
    <div class="grid3" style="max-width:860px">
      <div class="glass">
        <h3>Backend</h3>
        <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.5rem">
          <span class="tb tb-red">Laravel 12</span><span class="tb tb-blue">PHP 8.2+</span>
          <span class="tb tb-teal">Sanctum</span><span class="tb tb-purple">Breeze</span>
          <span class="tb tb-green">DomPDF</span><span class="tb tb-blue">Maatwebsite Excel</span>
          <span class="tb tb-green">QR Code</span>
        </div>
      </div>
      <div class="glass">
        <h3>Frontend</h3>
        <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.5rem">
          <span class="tb tb-teal">Tailwind CSS 3</span><span class="tb tb-purple">Alpine.js 3</span>
          <span class="tb tb-orange" style="background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3);color:#fde68a">Chart.js</span>
          <span class="tb tb-blue">Select2</span><span class="tb tb-green">Three.js</span>
          <span class="tb tb-red">Vite 6</span><span class="tb tb-purple">Font Awesome</span>
        </div>
      </div>
      <div class="glass">
        <h3>Dev & Quality</h3>
        <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.5rem">
          <span class="tb tb-blue">PHPUnit 11</span><span class="tb tb-teal">Laravel Pint</span>
          <span class="tb tb-green">Faker</span><span class="tb tb-purple">Laravel Sail</span>
          <span class="tb tb-blue">Laravel Pail</span>
          <span class="tb tb-red">SQLite (dev)</span><span class="tb tb-green">MySQL (prod)</span>
        </div>
      </div>
    </div>
    <div style="margin-top:1.5rem;max-width:760px;width:100%">
      <div class="glass" style="padding:1rem 1.5rem">
        <div class="flow">
          <div class="flow-box" style="background:rgba(59,130,246,0.2);color:#93c5fd">Browser / API Client</div>
          <span class="flow-arrow">→</span>
          <div class="flow-box" style="background:rgba(139,92,246,0.2);color:#c4b5fd">Middleware Stack</div>
          <span class="flow-arrow">→</span>
          <div class="flow-box" style="background:rgba(16,185,129,0.2);color:#6ee7b7">Controller</div>
          <span class="flow-arrow">→</span>
          <div class="flow-box" style="background:rgba(245,158,11,0.2);color:#fde68a">Eloquent Model</div>
          <span class="flow-arrow">→</span>
          <div class="flow-box" style="background:rgba(239,68,68,0.2);color:#fca5a5">Database</div>
          <span class="flow-arrow">→</span>
          <div class="flow-box" style="background:rgba(59,130,246,0.2);color:#93c5fd">Blade / JSON</div>
        </div>
      </div>
    </div>
  </div>`,

  // Slide 6 — Database & Models
  `<div class="slide s6" id="slide-5">
    <div class="bg-circle c1"></div><div class="bg-circle c2"></div>
    <div class="badge">🗄️ Data Architecture</div>
    <h2 style="text-align:center;margin-bottom:1rem">Database Schema & Models</h2>
    <div class="grid2" style="max-width:860px">
      <div class="glass">
        <h3>Core Tables</h3>
        <div style="font-size:0.85rem;color:#94a3b8;line-height:2">
          <div>🏠 <strong style="color:#e2e8f0">streets</strong> — name, zone, description</div>
          <div>👤 <strong style="color:#e2e8f0">users</strong> — profile, role, photo, id_number</div>
          <div>📋 <strong style="color:#e2e8f0">resident_extended</strong> — 35+ demographic fields</div>
          <div>🏗️ <strong style="color:#e2e8f0">projects</strong> — title, status, budget, dates</div>
          <div>✅ <strong style="color:#e2e8f0">tasks</strong> — title, status, due_date</div>
        </div>
      </div>
      <div class="glass">
        <h3>Pivot Tables & Tokens</h3>
        <div style="font-size:0.85rem;color:#94a3b8;line-height:2">
          <div>🔗 <strong style="color:#e2e8f0">project_user</strong> — many-to-many</div>
          <div>🔗 <strong style="color:#e2e8f0">task_user</strong> — multi-assignee</div>
          <div>🔑 <strong style="color:#e2e8f0">personal_access_tokens</strong> — Sanctum</div>
          <div>💾 <strong style="color:#e2e8f0">cache</strong> — DB cache store</div>
          <div>📤 <strong style="color:#e2e8f0">jobs</strong> — queue jobs</div>
        </div>
      </div>
      <div class="glass" style="grid-column:1/-1">
        <h3>Entity Relationships</h3>
        <div class="flow" style="font-size:0.8rem">
          <span style="color:#60a5fa">Street</span><span class="flow-arrow" style="color:#475569;font-size:0.8rem"> 1→M </span>
          <span style="color:#34d399">User</span><span class="flow-arrow" style="color:#475569;font-size:0.8rem"> 1→1 </span>
          <span style="color:#a78bfa">ResidentExtended</span>
          <br style="width:100%">
          <span style="color:#60a5fa">Street</span><span class="flow-arrow" style="color:#475569;font-size:0.8rem"> 1→M </span>
          <span style="color:#fbbf24">Project</span><span class="flow-arrow" style="color:#475569;font-size:0.8rem"> M↔M </span>
          <span style="color:#34d399">User</span>
          <span class="flow-arrow" style="color:#475569;font-size:0.8rem"> &nbsp;|&nbsp; </span>
          <span style="color:#fbbf24">Project</span><span class="flow-arrow" style="color:#475569;font-size:0.8rem"> 1→M </span>
          <span style="color:#f87171">Task</span><span class="flow-arrow" style="color:#475569;font-size:0.8rem"> M↔M </span>
          <span style="color:#34d399">User</span>
        </div>
        <p style="text-align:center;font-size:0.78rem;margin-top:0.7rem">23 migrations · Soft deletes on Users, Streets, Projects & Tasks · 9 performance indexes</p>
      </div>
    </div>
  </div>`,

  // Slide 7 — Security
  `<div class="slide s7" id="slide-6">
    <div class="bg-circle c1"></div><div class="bg-circle c2"></div>
    <div class="badge">🔒 Security Architecture</div>
    <h2 style="text-align:center;margin-bottom:1.2rem">Defence-in-depth security</h2>
    <div class="grid2" style="max-width:860px">
      <div class="glass">
        <h3>HTTP Layer</h3>
        <div style="font-size:0.83rem;color:#94a3b8;line-height:1.9">
          <div>✅ Content-Security-Policy (CSP)</div>
          <div>✅ X-Frame-Options: SAMEORIGIN</div>
          <div>✅ X-Content-Type-Options: nosniff</div>
          <div>✅ X-XSS-Protection: 1; mode=block</div>
          <div>✅ HSTS (production only)</div>
          <div>✅ Referrer-Policy: strict-origin</div>
          <div>✅ Permissions-Policy (no geo/mic/cam)</div>
        </div>
      </div>
      <div class="glass">
        <h3>Application Layer</h3>
        <div style="font-size:0.83rem;color:#94a3b8;line-height:1.9">
          <div>✅ Role-Based Access Control (RBAC)</div>
          <div>✅ AdminOnly middleware</div>
          <div>✅ SanitizeInput on all web requests</div>
          <div>✅ CSRF protection on all web forms</div>
          <div>✅ Bcrypt password hashing</div>
          <div>✅ Rate limiting (60/100/10 req/min)</div>
          <div>✅ Soft deletes (no accidental data loss)</div>
        </div>
      </div>
      <div class="glass">
        <h3>File Upload Security</h3>

const total = slides.length;
const container = document.getElementById('slides');
const dotNav = document.getElementById('dotNav');
let current = 0;

// Build slides and dots
slides.forEach((html, i) => {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;
  container.appendChild(wrapper.firstElementChild);
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goTo(i);
  dotNav.appendChild(dot);
});

function updateUI() {
  document.querySelectorAll('.slide').forEach((el, i) => {
    el.classList.remove('active', 'prev');
    if (i === current) el.classList.add('active');
    else if (i < current) el.classList.add('prev');
  });
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
  document.getElementById('navCounter').textContent = `${current + 1} / ${total}`;
  document.getElementById('slideNum').textContent = `${current + 1} / ${total}`;
  document.getElementById('progressBar').style.width = `${((current + 1) / total) * 100}%`;
}

function goTo(n) { current = Math.max(0, Math.min(total - 1, n)); updateUI(); }
function changeSlide(d) { goTo(current + d); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);
});

// Touch support
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = tx - e.changedTouches[0].clientX;
  if (Math.abs(dx) > 50) changeSlide(dx > 0 ? 1 : -1);
});

updateUI();
</script>
