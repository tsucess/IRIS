<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS — Ilicity Resident Information System</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#d4a017;--gold2:#f0c040;--green:#16a34a;--green2:#22c55e;
  --blue:#1d4ed8;--blue2:#3b82f6;--red:#dc2626;
  --dark:#0a1628;--dark2:#0f2240;--dark3:#162d4f;
  --text:#f0f4ff;--muted:#94a3b8;
  --glass:rgba(255,255,255,0.08);--glassBorder:rgba(255,255,255,0.15);
}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--dark);color:var(--text);overflow:hidden;height:100vh;}

/* ── Slides ── */
.slides{width:100%;height:100vh;position:relative;}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:2.5rem 3.5rem;opacity:0;pointer-events:none;
  transition:opacity 0.55s cubic-bezier(.4,0,.2,1),transform 0.55s cubic-bezier(.4,0,.2,1);
  transform:translateX(70px);}
.slide.active{opacity:1;pointer-events:all;transform:translateX(0);}
.slide.prev{opacity:0;transform:translateX(-70px);}

/* Backgrounds */
.bg-hero{background:radial-gradient(ellipse at 60% 30%,#1a3a6b 0%,#0a1628 60%),url('') center/cover;}
.bg-problem{background:linear-gradient(145deg,#1a0a0a 0%,#0a1628 50%,#1a1a0a 100%);}
.bg-what{background:linear-gradient(145deg,#0a1628 0%,#0d2545 60%,#0f1f3d 100%);}
.bg-residents{background:linear-gradient(145deg,#0a2010 0%,#0a1628 60%,#0d2010 100%);}
.bg-projects{background:linear-gradient(145deg,#0a0a28 0%,#0a1628 60%,#1a1028 100%);}
.bg-analytics{background:linear-gradient(145deg,#0a1a28 0%,#0a1628 60%,#0a2028 100%);}
.bg-id{background:linear-gradient(145deg,#1a0a20 0%,#0a1628 60%,#0a1628 100%);}
.bg-reports{background:linear-gradient(145deg,#0a200a 0%,#0a1628 100%);}
.bg-security{background:linear-gradient(145deg,#1a1a0a 0%,#0a1628 60%,#0a0a1a 100%);}
.bg-start{background:linear-gradient(145deg,#0a1628 0%,#0d2545 100%);}
.bg-vision{background:radial-gradient(ellipse at 40% 60%,#1a3a6b 0%,#0a1628 70%);}

/* Decorative blob */
.blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.12;pointer-events:none;}

/* ── Typography ── */
.eyebrow{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;
  padding:.35rem 1rem;border-radius:100px;display:inline-block;margin-bottom:1rem;}
.eyebrow-gold{background:rgba(212,160,23,.18);border:1px solid rgba(212,160,23,.35);color:var(--gold2);}
.eyebrow-green{background:rgba(22,163,74,.18);border:1px solid rgba(22,163,74,.35);color:var(--green2);}
.eyebrow-blue{background:rgba(29,78,216,.25);border:1px solid rgba(59,130,246,.35);color:#93c5fd;}
.eyebrow-red{background:rgba(220,38,38,.18);border:1px solid rgba(220,38,38,.35);color:#fca5a5;}
.eyebrow-purple{background:rgba(124,58,237,.18);border:1px solid rgba(139,92,246,.35);color:#c4b5fd;}
h1{font-size:clamp(2rem,5vw,3.4rem);font-weight:900;line-height:1.08;text-align:center;}
h2{font-size:clamp(1.4rem,3.2vw,2.1rem);font-weight:800;text-align:center;margin-bottom:.5rem;}
.lead{font-size:1.05rem;color:var(--muted);line-height:1.65;max-width:640px;text-align:center;margin:0 auto;}

/* ── Glass card ── */
.glass{background:var(--glass);border:1px solid var(--glassBorder);border-radius:16px;
  backdrop-filter:blur(14px);padding:1.4rem 1.5rem;}
.glass-strong{background:rgba(255,255,255,0.11);border:1px solid rgba(255,255,255,0.2);}

/* ── Grids ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;width:100%;max-width:880px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;width:100%;max-width:940px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;width:100%;max-width:940px;}

/* ── Benefit card ── */
.bcard{display:flex;flex-direction:column;gap:.35rem;}
.bcard .icon{font-size:2rem;margin-bottom:.2rem;}
.bcard h3{font-size:.98rem;font-weight:700;color:var(--text);}
.bcard p{font-size:.82rem;color:var(--muted);line-height:1.55;}

/* ── Quote ── */
.quote{font-size:1.1rem;font-style:italic;color:#cbd5e1;line-height:1.6;
  border-left:3px solid var(--gold);padding-left:1rem;max-width:580px;margin:0 auto;}

/* ── Stat pill ── */
.stat-pill{text-align:center;padding:.8rem 1.2rem;}
.stat-num{font-size:2.6rem;font-weight:900;line-height:1;}
.stat-label{font-size:.78rem;color:var(--muted);margin-top:.25rem;line-height:1.3;}

/* ── Pain point ── */
.pain{display:flex;gap:.9rem;align-items:flex-start;padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.06);}
.pain:last-child{border-bottom:none;}
.pain-icon{font-size:1.4rem;flex-shrink:0;margin-top:.1rem;}
.pain h4{font-size:.92rem;font-weight:700;color:#fca5a5;margin-bottom:.15rem;}
.pain p{font-size:.82rem;color:var(--muted);line-height:1.5;}

/* ── Step ── */
.step{display:flex;gap:1rem;align-items:flex-start;}
.step-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.95rem;flex-shrink:0;margin-top:.1rem;}
.step h4{font-size:.95rem;font-weight:700;margin-bottom:.2rem;}
.step p{font-size:.82rem;color:var(--muted);line-height:1.5;}

/* ── Comparison ── */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:1rem;width:100%;max-width:820px;}
.compare-col h3{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:.5rem 1rem;border-radius:8px;margin-bottom:.7rem;text-align:center;}
.compare-col li{font-size:.83rem;color:var(--muted);padding:.35rem 0;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:.5rem;align-items:flex-start;line-height:1.4;}
.compare-col li:last-child{border-bottom:none;}

/* ── Progress bar ── */
.pbar-wrap{margin-bottom:.9rem;}
.pbar-label{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-bottom:.3rem;}
.pbar{height:10px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:100px;}

/* ── Feature list ── */
.flist li{display:flex;gap:.7rem;align-items:flex-start;padding:.45rem 0;font-size:.88rem;color:#cbd5e1;line-height:1.5;}
.flist li span.ck{color:var(--green2);font-size:1.1rem;flex-shrink:0;margin-top:.05rem;}

/* ── Hero accent ── */
.hero-pill{display:inline-flex;align-items:center;gap:.5rem;padding:.45rem 1.1rem;
  background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.3);border-radius:100px;
  font-size:.82rem;color:var(--gold2);margin-right:.4rem;margin-top:.4rem;}

/* ── Nav ── */
nav{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:.8rem;
  background:rgba(10,22,40,.88);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);
  border-radius:100px;padding:.55rem 1.3rem;z-index:100;}
.nav-btn{background:none;border:none;color:var(--muted);font-size:1.05rem;cursor:pointer;
  padding:.25rem .5rem;border-radius:8px;transition:all .2s;}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.1);}
.dot-nav{display:flex;gap:.4rem;}
.dot{width:7px;height:7px;border-radius:50%;background:#334155;cursor:pointer;transition:all .2s;}
.dot.active{background:var(--gold);transform:scale(1.35);}
.nav-ctr{font-size:.82rem;color:#475569;min-width:52px;text-align:center;}

/* ── Progress top ── */
.pbar-top{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--green2));transition:width .4s ease;z-index:200;}

/* ── Watermark ── */
.wm{position:fixed;top:1.1rem;left:1.4rem;z-index:100;display:flex;align-items:center;gap:.5rem;}
.wm-dot{width:10px;height:10px;border-radius:50%;background:var(--gold);}
.wm-text{font-size:.82rem;font-weight:700;color:var(--gold2);letter-spacing:.05em;}
.slide-num{position:fixed;top:1.1rem;right:1.4rem;font-size:.75rem;color:#475569;z-index:100;}
</style>
</head>
<body>
<div class="pbar-top" id="pTop"></div>
<div class="wm"><div class="wm-dot"></div><span class="wm-text">IRIS — Ilisan Remo</span></div>
<div class="slide-num" id="sNum">1 / 12</div>
<div class="slides" id="slides"></div>
<nav>
  <button class="nav-btn" onclick="go(-1)">&#8592;</button>
  <div class="dot-nav" id="dots"></div>
  <div class="nav-ctr" id="ctr">1 / 12</div>
  <button class="nav-btn" onclick="go(1)">&#8594;</button>

const total=slides.length;
const container=document.getElementById('slides');
const dotsEl=document.getElementById('dots');
let cur=0;

slides.forEach((html,i)=>{
  const d=document.createElement('div');d.innerHTML=html;
  const el=d.firstElementChild;
  if(i!==0)el.classList.remove('active');
  container.appendChild(el);
  const dot=document.createElement('div');dot.className='dot'+(i===0?' active':'');
  dot.onclick=()=>goTo(i);dotsEl.appendChild(dot);
});

function update(){
  document.querySelectorAll('.slide').forEach((el,i)=>{
    el.classList.remove('active','prev');
    if(i===cur)el.classList.add('active');
    else if(i<cur)el.classList.add('prev');
  });
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
  const txt=`${cur+1} / ${total}`;
  document.getElementById('ctr').textContent=txt;
  document.getElementById('sNum').textContent=txt;
  document.getElementById('pTop').style.width=`${((cur+1)/total)*100}%`;
}
function goTo(n){cur=Math.max(0,Math.min(total-1,n));update();}
function go(d){goTo(cur+d);}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{const dx=tx-e.changedTouches[0].clientX;if(Math.abs(dx)>50)go(dx>0?1:-1);});
update();
</script>
